<script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const documentData = {{DATA:DOCUMENT:DOCUMENT_3}};
            const symposiumNumber = ref(1);
            const bookmarks = ref(JSON.parse(localStorage.getItem('xiii_encuentro_bookmarks') || '[]'));

            const symposium = computed(() => {
                return documentData.simposios.find(s => s.numero === symposiumNumber.value);
            });

            const updateSymposiumFromHash = () => {
                const hash = window.location.hash.substring(1);
                const num = parseInt(hash);
                if (!isNaN(num)) {
                    symposiumNumber.value = num;
                } else {
                    symposiumNumber.value = 1;
                }
            };

            const toggleBookmark = (title) => {
                if (bookmarks.value.includes(title)) {
                    bookmarks.value = bookmarks.value.filter(b => b !== title);
                } else {
                    bookmarks.value.push(title);
                }
                localStorage.setItem('xiii_encuentro_bookmarks', JSON.stringify(bookmarks.value));
            };

            const isBookmarked = (title) => {
                return bookmarks.value.includes(title);
            };

            onMounted(() => {
                updateSymposiumFromHash();
                window.addEventListener('hashchange', updateSymposiumFromHash);
            });

            return {
                symposium,
                toggleBookmark,
                isBookmarked
            };
        }
    }).mount('#app');
</script>
